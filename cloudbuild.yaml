steps:
  # ── Step 1: Install Node.js deps & lint frontend ──────────────────────────
  - name: 'node:20'
    id: 'frontend-lint'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci || npm install
        echo "Frontend lint/checks passed"

  # ── Step 2: Run Python unit tests ─────────────────────────────────────────
  - name: 'python:3.11'
    id: 'unit-tests'
    dir: 'backend'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r requirements.txt pytest pytest-asyncio pytest-cov
        pytest ../tests/unit/ -v --tb=short \
          --cov=main --cov-report=term-missing \
          --junitxml=/workspace/test-results-unit.xml
    waitFor: ['frontend-lint']

  # ── Step 3: Run Playwright E2E tests against static server ────────────────
  - name: 'mcr.microsoft.com/playwright:v1.44.0'
    id: 'e2e-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        cd /workspace
        npx playwright install --with-deps chromium
        node server.js &
        sleep 3
        BASE_URL=http://127.0.0.1:8080 npx playwright test tests/e2e/ \
          --reporter=junit --output-file=/workspace/test-results-e2e.xml
        kill %1 || true
    waitFor: ['unit-tests']

  # ── Step 4: Build Docker container for Cloud Run backend ─────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/trafficai-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/trafficai-api:latest'
      - './backend'
    waitFor: ['e2e-tests']

  # ── Step 5: Push Docker image to Artifact Registry ───────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/trafficai-api'
    waitFor: ['docker-build']

  # ── Step 6: Deploy backend to Cloud Run ──────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-cloud-run'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'trafficai-api'
      - '--image=gcr.io/$PROJECT_ID/trafficai-api:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--min-instances=1'
      - '--max-instances=50'
      - '--cpu=2'
      - '--memory=2Gi'
      - '--concurrency=200'
      - '--allow-unauthenticated'
      - '--set-env-vars=GCP_PROJECT=$PROJECT_ID'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest'
      - '--service-account=trafficai-api@$PROJECT_ID.iam.gserviceaccount.com'
    waitFor: ['docker-push']

  # ── Step 7: Deploy frontend to App Engine ─────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-app-engine'
    entrypoint: 'gcloud'
    args:
      - 'app'
      - 'deploy'
      - '--quiet'
      - '--version=$SHORT_SHA'
    waitFor: ['deploy-cloud-run']

# ── Artifacts: store test results ────────────────────────────────────────────
artifacts:
  objects:
    location: 'gs://$PROJECT_ID-build-artifacts/trafficai/$BUILD_ID/'
    paths:
      - 'test-results-unit.xml'
      - 'test-results-e2e.xml'

# ── Options ──────────────────────────────────────────────────────────────────
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

timeout: '1200s'  # 20 minutes max
